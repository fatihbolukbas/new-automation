name: Playwright BDD Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-execution:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Kodu GitHub'dan Çek
      uses: actions/checkout@v4

    - name: ⚙️ Node.js Kurulumu
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: 📦 Bağımlılıkları Yükle
      run: npm ci || npm install

    - name: 🌐 Playwright Tarayıcılarını Kur
      run: npx playwright install --with-deps chromium

    - name: 🚀 BDD Testlerini Çalıştır
      run: npm test
      env:
        CI: true

    - name: 📊 Test Raporunu Yükle (Her zaman)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-report
        path: cucumber-report.html
        retention-days: 30

    - name: 📈 Cucumber JSON Sonuçlarını Yükle
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-results
        path: cucumber.json
        retention-days: 30