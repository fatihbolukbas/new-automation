name: Playwright BDD Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-execution:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Kodu GitHub'dan Çek
      uses: actions/checkout@v4

    - name: ⚙️ Node.js Kurulumu
      uses: actions/setup-node@v4
      with:
        # 18 olan kısmı 20 yapıyoruz
        node-version: 20 
        cache: 'npm'

    - name: 📦 Bağımlılıkları Yükle
      run: npm install

    - name: 🌐 Playwright Tarayıcılarını Kur
      run: npx playwright install --with-deps chromium

    - name: 🚀 BDD Testlerini Çalıştır
      run: npm test
      env:
        CI: true