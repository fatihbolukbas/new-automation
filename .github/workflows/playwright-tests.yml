name: Playwright BDD Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-execution:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Kodu GitHub'dan Çek
      uses: actions/checkout@v4

    - name: ⚙️ Node.js Kurulumu
      uses: actions/setup-node@v4
      with:
        node-version: 18 
        cache: 'npm' # Hızlandırmak için cache ekledik

    - name: 📦 Bağımlılıkları Yükle
      # npm install yerine npm ci daha stabildir (package-lock.json'ı baz alır)
      run: npm ci || npm install

    - name: 🌐 Playwright Tarayıcılarını Kur
      # sh: 1: playwright: Permission denied hatasını engellemek için npx ile çalıştırıyoruz
      run: npx playwright install --with-deps chromium

    - name: 🚀 BDD Testlerini Çalıştır
      # CI=true parametresi Playwright'ı otomatik headless moda sokar
      run: npm test
      env:
        CI: true